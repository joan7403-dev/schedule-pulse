<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Collection Pulse{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#5D3FD3",
                        "on-primary": "#ffffff",
                        "secondary": "#fcd400",
                        "on-secondary": "#705d00",
                        "background": "#fdf8ff",
                        "error": "#ba1a1a"
                    },
                    fontFamily: { "sans": ["Manrope", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #fdf8ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .editorial-gradient { background: linear-gradient(135deg, #5D3FD3 0%, #7c5ef2 100%); }
        .card-shadow { box-shadow: 0 10px 30px rgba(93, 63, 211, 0.05); }
        .grid-cell.selected { background-color: #5D3FD3 !important; }
        .heatmap-cell:hover { outline: 2px solid #5D3FD3; z-index: 10; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #5D3FD3; box-shadow: 0 0 0 2px rgba(93, 63, 211, 0.1); }
    </style>
</head>
<body class="text-slate-900 pb-24">
<header class="sticky top-0 z-50 bg-background/80 backdrop-blur-md border-b border-primary/5 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg editorial-gradient flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-sm">event_repeat</span>
        </div>
        <a href="/" class="text-xl font-extrabold tracking-tight text-primary">Collection Pulse</a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
</main>

<footer class="text-center py-10 text-slate-300 text-[10px] font-bold uppercase tracking-[0.3em]">
    Collection Pulse &copy; 2024
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
